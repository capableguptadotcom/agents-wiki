project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "*.md"
  resources:
    - assets/
    - interactive.html
    - .nojekyll

website:
  title: "Enterprise Agents Wiki"
  site-url: "https://capableguptadotcom.github.io/agents-wiki/"
  repo-url: "https://github.com/capableguptadotcom/agents-wiki"
  page-navigation: true
  search: true
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: system-diagram-spine.qmd
        text: Diagrams
      - href: implementation-lab.md
        text: Contracts
      - href: interactive-labs.md
        text: Labs
      - href: references.md
        text: Sources
    right:
      - icon: github
        href: "https://github.com/capableguptadotcom/agents-wiki"
        aria-label: GitHub
  sidebar:
    style: docked
    search: true
    contents:
      - section: "Start"
        contents:
          - index.qmd
          - research-operating-system.md
          - site-template-decision.md
          - system-diagram-spine.qmd
          - markdown-first-authoring.md
          - agent-native-product-wiki.md
          - learning-path.md
      - section: "Source Library"
        contents:
          - references.md
          - source-atlas.md
          - research-standards.md
          - evidence-chain-architecture.md
          - paper-to-product-lab.md
          - case-studies.md
          - industry-pattern-teardowns.md
          - industry-case-architecture-lab.md
      - section: "Decisions"
        contents:
          - architecture-decisions.md
          - protocol-runtime-decision-lab.md
          - architecture-review.md
          - design-philosophy-lab.qmd
          - architecture-composition-workbench.md
          - agent-maturity-model.md
      - section: "System Contracts"
        contents:
          - architecture-blueprint.md
          - implementation-lab.md
          - product-object-model-lab.md
          - runtime-ledger.md
          - intent-to-action-router.md
          - capability-registry.md
          - identity-access-lab.md
          - source-system-integration-lab.md
          - deployment-topology-lab.md
      - section: "Vertical Slices"
        contents:
          - end-to-end-architecture-walkthrough.md
          - architecture-assembly-data.md
          - deep-agent-application-architecture.qmd
          - deep-agent-lab.md
          - deep-agent-runbook.md
          - subagent-handoff-simulator.md
      - section: "Governance"
        contents:
          - approval-handoff.md
          - durable-execution.md
          - memory-governance.md
          - memory-lifecycle-simulator.md
          - skill-lifecycle-lab.md
          - agent-control-plane.md
          - agent-operations-lifecycle.md
          - eval-release-harness.md
          - agent-threat-model.md
      - section: "Labs And UX"
        contents:
          - interactive-labs.md
          - run-simulator.md
          - product-ux-surfaces.md
          - visual-maps.md
          - aspect-playbook.md
      - section: "Backlog"
        contents:
          - deep-dive-backlog.md

format:
  html:
    theme: zephyr
    css: docs.css
    page-layout: article
    grid:
      sidebar-width: 280px
      body-width: 920px
      margin-width: 220px
      gutter-width: 1rem
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    link-external-newwindow: true
execute:
  freeze: auto
