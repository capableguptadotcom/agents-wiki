name: MkDocs Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: python -m pip install --upgrade mkdocs-material

      - name: Verify wiki source
        run: |
          node scripts/generate-assembly-data.mjs
          node scripts/generate-flow-tutorial-data.mjs
          node --check wiki/assets/generated/assembly-data.js
          node --check wiki/assets/generated/flow-tutorial-data.js
          node --check wiki/assets/app.js
          node --check wiki/assets/javascripts/flow-tutorial.js
          node scripts/verify-wiki.mjs

      - name: Build MkDocs website
        run: mkdocs build --strict

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
